    <meta name="theme-color" content="#fff8eb" media="(prefers-color-scheme: light)" />

    <title>Ishaan Abhinav · Lead Software Engineer</title>
    <meta

    <link rel="canonical" href="https://ishaanabhinav.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ishaanabhinav.com" />
    <meta property="og:title" content="Ishaan Abhinav · Lead Software Engineer" />
    <meta
      property="og:description"
      content="Lead Software Engineer at Gojek. Real-time bidding, distributed systems, and product engineering."
    />

    <meta name="twitter:image" content="https://ishaanabhinav.com/og-image.png" />

    <!-- Preconnect to font CDN -->
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

    <!-- Prevent FOUC: apply persisted theme before React mounts -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-ink-50 text-ink-900 antialiased dark:bg-ink-950 dark:text-ink-50">

      <div style="padding: 2rem; text-align: center; font-family: system-ui">

    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
